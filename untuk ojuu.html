<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Surat Cinta</title>
    <style>
        body {

            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }
        .love {
            font-size: 24px;
            color: #ff4d6d;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
            color: #ff4d6d;
            margin-bottom: 15px;
        }
        .text {
            font-size: 15px;
            color: #444;
            line-height: 1.6;
        }
        .footer {
            margin-top: 15px;
            color: #ff4d6d;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="love">💗💗💗</div>
    <div class="title">Hai cintaku 💗</div>

        Balikan yuk… aku minta maaf udah jahattt 🥺🙏🏻 <br>
    </div>

    <div class="footer">
        Love you always 💗✨
    </div>
</div>

</body>
</html>
